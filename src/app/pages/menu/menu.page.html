<ion-content class="menu-content">

  <div class="container">

    <div class="header">
      <div>
        <p class="welcome">Hola,</p>
        <h1>{{ nombreUsuario }}</h1>
      </div>

      <div class="avatar">
        <ion-icon name="person-outline"></ion-icon>
      </div>
    </div>

    <div class="next-card">
      <div>
        <p>Próxima cita</p>
        <h2>{{ proximaCita.servicio }}</h2>
        <span>{{ proximaCita.fecha }} - {{ proximaCita.hora }}</span>
      </div>
      <ion-icon name="calendar-outline"></ion-icon>
    </div>

    <div class="stats">
      <div class="stat-card">
        <h3>{{ totalServicios }}</h3>
        <p>Servicios</p>
      </div>

      <div class="stat-card">
        <h3>{{ totalCitas }}</h3>
        <p>Citas</p>
      </div>
    </div>

    <h2 class="section-title">Accesos rápidos</h2>

    <div class="actions-grid">

      <div class="action-card" routerLink="/servicios">
        <ion-icon name="cut-outline"></ion-icon>
        <h3>Servicios</h3>
        <p>Ver catálogo</p>
      </div>

      <div class="action-card" routerLink="/agendar-cita">
        <ion-icon name="add-circle-outline"></ion-icon>
        <h3>Agendar</h3>
        <p>Nueva cita</p>
      </div>

      <div class="action-card">
        <ion-icon name="time-outline"></ion-icon>
        <h3>Historial</h3>
        <p>Ver citas</p>
      </div>

      <div class="action-card">
        <ion-icon name="settings-outline"></ion-icon>
        <h3>Perfil</h3>
        <p>Mis datos</p>
      </div>

    </div>

    <ion-button expand="block" fill="outline" class="logout-button" (click)="cerrarSesion()">
      Cerrar sesión
    </ion-button>

  </div>

</ion-content>
